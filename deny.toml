[advisories]
ignore = [
    "RUSTSEC-2026-0098", # https://rustsec.org/advisories/RUSTSEC-2026-0098 name constraints for URI names were incorrectly accepted (no fix available @ 2026-05-08, via `aws-config` > `aws-smithy-runtime` > `aws-smithy-http-client` > `rustls` > `rustls-webpki`)
    "RUSTSEC-2026-0099", # https://rustsec.org/advisories/RUSTSEC-2026-0099 permitted subtree name constraints for DNS names were accepted for certificates asserting a wildcard name (no fix available @ 2026-05-08, via `aws-config` > `aws-smithy-runtime` > `aws-smithy-http-client` > `rustls` > `rustls-webpki`)
    "RUSTSEC-2026-0104", # https://rustsec.org/advisories/RUSTSEC-2026-0104 reachable panic in certificate revocation list parsing (no fix available @ 2026-05-08, via `aws-config` > `aws-smithy-runtime` > `aws-smithy-http-client` > `rustls` > `rustls-webki`)
]

[licenses]
confidence-threshold = 0.925
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-3-Clause",
    "CDLA-Permissive-2.0",
    "ISC",
    "MIT",
    "Zlib",
    "Unicode-3.0",
    "CDLA-Permissive-2.0"
]

[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [
    { path = "LICENSE", hash = 0xbd0eed23 }
]

[[licenses.clarify]]
name = "webpki"
expression = "ISC"
license-files = [
    { path = "LICENSE", hash = 0x001c7e6c }
]

[[licenses.clarify]]
name = "rustls-webpki"
expression = "ISC"
license-files = [
    { path = "LICENSE", hash = 0x001c7e6c }
]
